# XStem Navigation System Configuration

waypoints:
  csv_path: "~/Amiga/X-Platform/paths/kktcRearRoadspf.csv"

  # Coordinate system of the CSV file. One of:
  #   "ENU"     - CSV has dx (East) and dy (North) columns in metres (default)
  #   "NWU"     - CSV has north and west columns in metres
  #   "LATLONG" - CSV has lat and lon columns in WGS-84 decimal degrees.
  #               Requires reference_lat/reference_lon to be set below, OR
  #               omit them to use the first CSV row as the local origin.
  coordinate_system: "ENU"

  # Reference point for LATLONG coordinate system (required).
  # Set to the base station (e.g. Emlid RS2+) GPS coordinates.
  # The filter's world frame origin is defined by the base station,
  # so all converted waypoints will align with the filter's pose output.
  # If omitted, the first CSV row is used as the origin (less reliable).
  # reference_lat: 35.123456   # decimal degrees
  # reference_lon: 33.456789   # decimal degrees

  # Hole IDs use letter+number format (e.g. A0, B1). The letter indicates
  # the echelon/row, the number the hole within that row. Echelon ends and
  # boustrophedon traversal order are determined automatically from the IDs.
  turn_direction: "left"
  # Turn type for row-end maneuver:
  #   "pi_turn"       - drive forward then 180° arc (2 segments)
  #   "turn_in_place" - drive forward, 90° turn, lateral, 90° turn (4 segments)
  turn_type: "pi_turn"
  row_spacing_m: 3.0
  headland_buffer_m: 3.0

module: xprime

vision:
  enabled: false
  mode: "stop_to_detect"
  search_radius_m: 1.0
  detection_timeout_s: 10.0
  min_confidence: 0.7
  # Camera hardware config is in platform_config.yaml

navigation:
  approach_offset_m: 1.2
  error_recovery_max_retries: 3
  filter_convergence_retries: 3
  can_recovery_delay_s: 0.5

thresholds:
  positioning_accuracy_m: 0.05
  heading_accuracy_deg: 10.0
  alignment_tolerance_m: 0.02
