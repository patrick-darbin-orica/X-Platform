# XStem Navigation System Configuration

waypoints:
  csv_path: "~/Amiga/amiga-adk/py/examples/waypoint_navigation/surveyed-waypoints/kktcRearRoad.csv"
  coordinate_system: "ENU"
  last_row_waypoint_index: 3
  turn_direction: "left"
  row_spacing_m: 3.0
  headland_buffer_m: 3.0

module: xstem

vision:
  enabled: false
  mode: "stop_to_detect"
  search_radius_m: 1.0
  detection_timeout_s: 10.0
  min_confidence: 0.7

  forward_camera:
    service_name: "oak/1"
    role: "forward"
    model_path: "~/Amiga/X-Platform/models/best1.engine"
    offset_x: 0.55
    offset_y: 0.0
    offset_z: 0.88
    pitch_deg: 30.0

  downward_camera:
    service_name: "oak/0"
    role: "downward"
    model_path: "~/Amiga/X-Platform/models/best1.engine"
    offset_x: 0.25
    offset_y: 0.0
    offset_z: 0.5
    pitch_deg: -90.0

navigation:
  approach_offset_m: 1.2
  error_recovery_max_retries: 3
  filter_convergence_retries: 3
  can_recovery_delay_s: 0.5

thresholds:
  positioning_accuracy_m: 0.05
  heading_accuracy_deg: 10.0
  alignment_tolerance_m: 0.02
